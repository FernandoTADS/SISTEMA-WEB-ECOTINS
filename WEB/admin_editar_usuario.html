<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>EcoTins Admin - Editar Usuário</title>
</head>
<body>

    <header class="navbar" style="border-bottom: 2px solid #e53e3e;">
        <div class="logo">
            <img src="{{ url_for('static', filename='assets/logo_ecotins.png') }}" alt="EcoTins Logo">
            <h1>Modificar Usuário</h1>
        </div>
        <nav>
            <a href="/admin/usuarios" class="nav-btn">← VOLTAR AO PAINEL</a>
        </nav>
    </header>

    <main class="container">
        <div class="banner" style="flex-direction: column; align-items: center; text-align: left; max-width: 480px; padding: 40px 30px;">
            <h2 style="margin-bottom: 5px; width: 100%; text-align: center;">Alterar Dados da Conta</h2>
            <p style="color: #718096; margin-bottom: 30px; font-size: 14px; width: 100%; text-align: center;">
                Modificando o cadastro do usuário Código <strong>#{{ usuario['id'] }}</strong>
            </p>
            
            <form action="/admin/usuarios/editar/{{ usuario['id'] }}" method="POST" style="width: 100%;">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" value="{{ usuario['nome'] }}" class="form-input-custom" required style="width:100%; height:45px; margin-bottom:15px; padding:10px; border-radius:6px; border:1px solid #cbd5e0;">
                </div>

                <div class="form-group">
                    <label for="email">E-mail Corporativo/Pessoal</label>
                    <input type="email" id="email" name="email" value="{{ usuario['email'] }}" class="form-input-custom" required style="width:100%; height:45px; margin-bottom:25px; padding:10px; border-radius:6px; border:1px solid #cbd5e0;">
                </div>

                <button type="submit" class="btn-login-submit" style="background-color: #e53e3e; border-color: #e53e3e;">Salvar Alterações</button>
            </form>
        </div>
    </main>

</body>
</html>
